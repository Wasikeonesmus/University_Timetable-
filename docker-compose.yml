version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: timetable_db
    environment:
      - POSTGRES_DB=timetable_db
      - POSTGRES_USER=timetable_user
      - POSTGRES_PASSWORD=timetable_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: timetable_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes  # enable AOF persistence

  web:
    build: .
    container_name: timetable_web
    command: gunicorn timetable_project.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --timeout 300
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-prod-key-goes-here-12345}
      - DEBUG=${DEBUG:-True}
      - DATABASE_URL=${DATABASE_URL:-postgres://timetable_user:timetable_pass@db:5432/timetable_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/1}
      - ALLOWED_HOSTS=*
      - CSRF_TRUSTED_ORIGINS=http://167.233.37.95,http://localhost,http://127.0.0.1
      - EMAIL_BACKEND=scheduler.email_backend.IPv4EmailBackend
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-False}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-no-reply@localhost}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: timetable_worker
    command: python manage.py qcluster
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-prod-key-goes-here-12345}
      - DEBUG=${DEBUG:-True}
      - DATABASE_URL=${DATABASE_URL:-postgres://timetable_user:timetable_pass@db:5432/timetable_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/1}
      - EMAIL_BACKEND=scheduler.email_backend.IPv4EmailBackend
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-False}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-no-reply@localhost}
    depends_on:
      - db
      - redis
      - web

  nginx:
    image: nginx:alpine
    container_name: timetable_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
    depends_on:
      - web

volumes:
  pgdata:
  redisdata:
